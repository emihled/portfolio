<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portfolio</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Inter", sans-serif;
    }

    body {
      overflow-x: hidden;
      background: black;
      color: white;
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    body.fade-in {
      opacity: 1;
    }

    body.fade-out {
      opacity: 0;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
    }

    /* Loader */
    #loader {
      position: fixed;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      font-size: 1.5rem;
      letter-spacing: 2px;
      color: #0f0;
      text-shadow: 0 0 10px #0f0;
      animation: glitch 1s infinite;
    }

    @keyframes glitch {
      0% { opacity: 1; }
      50% { opacity: 0.4; }
      100% { opacity: 1; }
    }

    .fade-out-loader {
      opacity: 0;
      transition: opacity 1s ease;
    }

    .container {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      opacity: 0;
      transition: opacity 1s ease;
    }

    .container.show {
      opacity: 1;
    }

    .glass {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 40px;
      max-width: 700px;
      width: 100%;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    h2 {
      font-weight: 300;
      color: #aaa;
      margin-bottom: 20px;
    }

    p {
      color: #bbb;
      line-height: 1.6;
      margin-bottom: 30px;
    }

    .buttons {
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 12px 24px;
      border-radius: 30px;
      border: 1px solid #888;
      background: transparent;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: white;
      color: black;
    }

    .contact-panel {
      margin-top: 25px;
      display: none;
      opacity: 0;
      transition: 0.5s ease;
    }

    .contact-panel.show {
      display: block;
      opacity: 1;
    }

    .contact-item {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 15px 0;
      font-size: 1.1rem;
    }

    .contact-item a {
      color: white;
      text-decoration: none;
      transition: 0.3s;
    }

    .contact-item a:hover {
      color: #00ff88;
    }

    .icon {
      color: #00ff88;
      font-size: 1.3rem;
    }

    .footer {
      text-align: center;
      font-size: 0.8rem;
      color: #666;
      padding: 20px;
      opacity: 0;
      transition: opacity 1s ease;
    }

    .footer.show {
      opacity: 1;
    }
  </style>
</head>
<body>

  <div id="loader">
    <span id="loading-text"></span>
  </div>

  <canvas id="matrix"></canvas>

  <div class="container" id="mainContent">
    <div class="glass">
      <h1>Emihle Dumo</h1>
      <h2>Entry-level Web Developer</h2>

      <p>
        I’m a junior full stack web developer with a strong interest in front-end and back-end development. I also have experience in digital graphics designing.
      </p>

      <div class="buttons">
        <button class="btn" onclick="goToProjects()">View Work</button>
        <button class="btn" onclick="toggleContact()">Contact Me</button>
        <a href="Emihle_Dumo_CV.pdf" download><button class="btn">Download CV</button></a>
      </div>

      <div class="contact-panel" id="contact">
        <div class="contact-item">
          <i class="fa-solid fa-envelope icon"></i>
          <a href="mailto:emihledumo@gmail.com">emihledumo@gmail.com</a>
        </div>

        <div class="contact-item">
          <i class="fa-brands fa-whatsapp icon"></i>
          <a href="https://wa.me/27782134970" target="_blank">078 213 4970</a>
        </div>

        <div class="contact-item">
          <i class="fa-brands fa-linkedin icon"></i>
          <a href="#" target="_blank">Emihle Dumo</a>
        </div>
      </div>

    </div>
  </div>

  <div class="footer" id="footer">
    © 2026 Emihle Dumo — All rights reserved
  </div>

  <script>
    const canvas = document.getElementById("matrix");
    const ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const letters = "01";
    const fontSize = 14;
    const columns = canvas.width / fontSize;

    const drops = Array.from({ length: columns }).fill(1);

    function draw() {
      ctx.fillStyle = "rgba(0, 0, 0, 0.08)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const loaderVisible = document.getElementById("loader").style.display !== "none";
      ctx.fillStyle = loaderVisible ? "#0f0" : "#888";
      ctx.font = fontSize + "px monospace";

      drops.forEach((y, i) => {
        const text = letters.charAt(Math.floor(Math.random() * letters.length));
        const x = i * fontSize;

        ctx.fillText(text, x, y * fontSize);

        if (y * fontSize > canvas.height && Math.random() > 0.975) {
          drops[i] = 0;
        }

        drops[i]++;
      });
    }

    setInterval(draw, 40);

    const loadingText = "INITIALIZING SYSTEM...";
    let i = 0;

    function typeEffect() {
      if (i < loadingText.length) {
        document.getElementById("loading-text").innerHTML += loadingText.charAt(i);
        i++;
        setTimeout(typeEffect, 50);
      }
    }

    typeEffect();

    window.addEventListener("load", () => {
      document.body.classList.add("fade-in");

      const loader = document.getElementById("loader");
      const content = document.getElementById("mainContent");
      const footer = document.getElementById("footer");

      setTimeout(() => loader.classList.add("fade-out-loader"), 2000);

      setTimeout(() => {
        loader.style.display = "none";
        content.classList.add("show");
        footer.classList.add("show");
      }, 3000);
    });

    function toggleContact() {
      const panel = document.getElementById("contact");
      panel.classList.toggle("show");
    }

    function goToProjects() {
      document.body.classList.remove("fade-in");
      document.body.classList.add("fade-out");

      setTimeout(() => {
        window.location.href = "projects.html";
      }, 600);
    }
  </script>

</body>
</html>
